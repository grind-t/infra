name: Test YC Runner

on:
  workflow_dispatch:

jobs:
  start-runner:
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.runner.outputs.label }}
    steps:
      - uses: yc-actions/yc-github-runner@v2
        id: runner
        with:
          mode: start
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          folder-id: b1g606qspnhgrua2djkm
          image-id: fd8fc3q8qr0cgjqk2v94
          zone-id: ru-central1-a
          subnet-id: e9bon76tk7pevgfp6ioh
          cores: 2
          memory: 2GB
          disk-type: network-ssd

  test:
    needs: start-runner
    runs-on: ${{ needs.start-runner.outputs.label }}
    timeout-minutes: 15
    steps:
      - name: System info
        run: |
          echo "Hostname: $(hostname)"
          echo "Kernel: $(uname -r)"
          echo "CPU cores: $(nproc)"
          echo "RAM: $(free -h | awk '/^Mem:/ {print $2}')"
          echo "Disk: $(df -h / | awk 'NR==2 {print $4}') free"

      - name: Check internet access
        run: curl -sf https://api.github.com/zen

      - name: Confirm runner is ephemeral
        run: |
          if [ "${RUNNER_EPHEMERAL}" = "true" ]; then
            echo "Runner is ephemeral"
          else
            echo "WARNING: runner is not ephemeral"
          fi

  stop-runner:
    needs: [start-runner, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: yc-actions/yc-github-runner@v2
        with:
          mode: stop
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          label: ${{ needs.start-runner.outputs.label }}
